name: Listing smoke matrix

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: URL окружения без завершающего слеша
        required: true
        default: https://techaks.ru
  workflow_run:
    workflows:
      - Deploy to REG.RU VPS
    types:
      - completed

concurrency:
  group: listing-smoke-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  smoke:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout deployed revision
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run listing smoke matrix
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url || 'https://techaks.ru' }}
        run: npm run test:e2e:listings
