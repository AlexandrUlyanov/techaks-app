name: Deploy to REG.RU VPS

on:
  push:
    branches:
      - master

env:
  SERVER_IP: "195.208.2.100"
  SERVER_USER: "root"
  APP_DIR: "/var/www/techaks"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_IP }}
          username: ${{ env.SERVER_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            # 1. Ensure directory exists and clone/pull repository
            if [ ! -d "${{ env.APP_DIR }}/.git" ]; then
              echo "Initial clone..."
              git clone https://github.com/AlexandrUlyanov/techaks-app.git ${{ env.APP_DIR }}
            else
              echo "Pulling latest changes..."
              cd ${{ env.APP_DIR }}
              git reset --hard
              git pull origin master
            fi

            # 2. Setup environment variables
            cd ${{ env.APP_DIR }}
            
            # Create/Update .env file
            cat << 'EOF' > .env
            DATABASE_URL="mysql://techaks:TechAks_DB_Secure123!@127.0.0.1:3306/techaks_prod"
            PORT=3000
            NODE_ENV=production
            GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
            EOF

            # 3. Install dependencies and Build
            echo "Installing dependencies..."
            npm ci

            echo "Running database migrations..."
            npm run db:push

            echo "Building application..."
            npm run build

            # 4. Restart PM2
            echo "Restarting PM2 process..."
            pm2 restart techaks || pm2 start dist/boot.js --name "techaks"
            
            # Save PM2 state to start on boot
            pm2 save
