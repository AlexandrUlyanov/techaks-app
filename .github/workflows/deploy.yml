name: Deploy to REG.RU VPS

on:
  push:
    branches:
      - master

env:
  SERVER_IP: "195.208.2.100"
  SERVER_USER: "root"
  APP_DIR: "/var/www/techaks"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_IP }}
          username: ${{ env.SERVER_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            # 1. Ensure directory exists and clone/pull repository
            if [ ! -d "${{ env.APP_DIR }}/.git" ]; then
              echo "Initial clone..."
              git clone https://github.com/AlexandrUlyanov/techaks-app.git ${{ env.APP_DIR }}
            else
              echo "Pulling latest changes..."
              cd ${{ env.APP_DIR }}
              git reset --hard
              git pull origin master
            fi

            # 2. Setup environment variables
            cd ${{ env.APP_DIR }}
            
            # Create/Update .env file
            cat << 'EOF' > .env
            DATABASE_URL="mysql://techaks:TechAks_DB_Secure123!@127.0.0.1:3306/techaks_prod"
            PORT=3000
            NODE_ENV=production
            GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
            EOF

            # 3. Install dependencies and Build
            echo "Installing dependencies..."
            npm ci

            echo "Running database migrations..."
            npm run db:push

            echo "Applying store profile updates..."
            node --input-type=module <<'NODE'
            import mysql from "mysql2/promise";

            const connection = await mysql.createConnection({
              host: "127.0.0.1",
              user: "techaks",
              password: "TechAks_DB_Secure123!",
              database: "techaks_prod",
            });

            await connection.execute(
              `UPDATE stores
               SET name = ?, address = ?, hours = ?, phone = ?, rating = ?, review_count = ?, image = ?, map_url = ?, sort_order = ?
               WHERE address LIKE ? OR name LIKE ?`,
              [
                "пр. Строителей, 50А",
                "пр. Строителей, 50А",
                "Ежедневно 9:00–21:00",
                "+7 (927) 364-28-88",
                "4.9",
                34,
                "/images/stores/stroiteley-50a.webp",
                "https://yandex.com/maps/org/tekhaks/81538152780/?indoorLevel=1&ll=44.920957%2C53.222379&z=17.64",
                0,
                "%Строителей, 50А%",
                "%Строителей, 50А%",
              ]
            );

            await connection.execute(
              `UPDATE stores
               SET name = ?, address = ?, hours = ?, phone = ?, rating = ?, review_count = ?, image = ?, map_url = ?, sort_order = ?
               WHERE address LIKE ? OR name LIKE ?`,
              [
                "ТЦ Застава (ул. Генерала Глазунова, 1)",
                "Пенза, ул. Генерала Глазунова, 1, этаж 1",
                "Ежедневно 9:00–21:00",
                "+7 (927) 364-28-88",
                "5.0",
                43,
                "/images/stores/glazunova-1.webp",
                "https://yandex.com/maps/org/tekhaks/204121927664/?display-text=%D1%82%D1%86%20%D0%B7%D0%B0%D1%81%D1%82%D0%B0%D0%B2%D0%B0%20%D0%BF%D0%B5%D0%BD%D0%B7%D0%B0%20%D1%82%D0%B5%D1%85%D0%B0%D0%BA%D1%81&indoorLevel=1&ll=44.880796%2C53.232707&mode=search&sll=44.878875%2C53.232745&sspn=0.021887%2C0.007667&text=%D1%82%D1%86%20%D0%B7%D0%B0%D1%81%D1%82%D0%B0%D0%B2%D0%B0%20%D0%BF%D0%B5%D0%BD%D0%B7%D0%B0%20%D1%82%D0%B5%D1%85%D0%B0%D0%BA%D1%81&z=17",
                1,
                "%Глазунова, 1%",
                "%Глазунова, 1%",
              ]
            );

            await connection.end();
            NODE

            echo "Building application..."
            npm run build

            # 4. Restart PM2
            echo "Restarting PM2 process..."
            pm2 restart techaks || pm2 start dist/boot.js --name "techaks"
            
            # Save PM2 state to start on boot
            pm2 save
