name: Deploy to REG.RU VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  SERVER_IP: "195.208.2.100"
  SERVER_USER: "root"
  APP_DIR: "/var/www/techaks"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Validate required deploy secrets
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          APP_ENCRYPTION_KEY: ${{ secrets.APP_ENCRYPTION_KEY }}
        run: |
          set -eu
          test -n "$VPS_PASSWORD"
          test -n "$DB_PASSWORD"
          test -n "$APP_SECRET"
          test -n "$APP_ENCRYPTION_KEY"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_IP }}
          username: ${{ env.SERVER_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -eu

            dump_debug() {
              echo "---- DEPLOY DEBUG START ----"
              echo "PWD: $(pwd || true)"
              echo "Git HEAD: $(git rev-parse --short HEAD 2>/dev/null || echo unknown)"
              echo "Node: $(node -v 2>/dev/null || echo missing)"
              echo "NPM: $(npm -v 2>/dev/null || echo missing)"
              pm2 status techaks --no-color || true
              tail -n 80 /root/.pm2/logs/techaks-error.log 2>/dev/null || true
              tail -n 40 /root/.pm2/logs/techaks-out.log 2>/dev/null || true
              echo "---- DEPLOY DEBUG END ----"
            }

            smoke_check() {
              local url="$1"
              local pattern="${2:-}"

              if [ -n "$pattern" ]; then
                curl -fsS "$url" | grep -q "$pattern"
              else
                curl -fsS "$url" >/dev/null
              fi
            }

            trap 'dump_debug' ERR

            # 1. Ensure directory exists and clone/pull repository
            if [ ! -d "${{ env.APP_DIR }}/.git" ]; then
              echo "Initial clone..."
              git clone https://github.com/AlexandrUlyanov/techaks-app.git ${{ env.APP_DIR }}
            else
              echo "Pulling latest changes..."
              cd ${{ env.APP_DIR }}
              git fetch origin master
              git reset --hard origin/master
              git clean -fd -e public/images -e public/logs
            fi

            # 2. Setup environment variables
            cd ${{ env.APP_DIR }}

            # The production database credential is server-owned. Preserve the
            # last known-good URL during regular deploys; DB_PASSWORD is only a
            # bootstrap fallback for a fresh installation.
            EXISTING_DATABASE_URL=""
            if [ -f .env ]; then
              EXISTING_DATABASE_URL="$(sed -n 's/^DATABASE_URL=//p' .env | head -n 1)"
            fi
            if [ -z "$EXISTING_DATABASE_URL" ]; then
              EXISTING_DATABASE_URL='"mysql://techaks:${{ secrets.DB_PASSWORD }}@127.0.0.1:3306/techaks_prod"'
            fi
            
            # Create/Update .env file
            cat << 'EOF' > .env
            DATABASE_URL=__TECHAKS_DATABASE_URL__
            PORT=3000
            NODE_ENV=production
            GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
            APP_SECRET="${{ secrets.APP_SECRET }}"
            APP_ENCRYPTION_KEY="${{ secrets.APP_ENCRYPTION_KEY }}"
            YANDEX_GEOSUGGEST_API_KEY="${{ secrets.YANDEX_GEOSUGGEST_API_KEY }}"
            YANDEX_GEOCODER_API_KEY="${{ secrets.YANDEX_GEOCODER_API_KEY }}"
            YANDEX_MAPS_API_KEY="${{ secrets.YANDEX_MAPS_API_KEY }}"
            
            # Web Push
            VAPID_PUBLIC_KEY="BCKWu4rcJHLXH9Jo4kSXE9LNFgvMj6yseoKKBZTNvZNwDaOSpxUso5W8cS7QhQxz_3XbQ2pmkqv40lPODunzeZE"
            VAPID_PRIVATE_KEY="${{ secrets.VAPID_PRIVATE_KEY }}"
            VAPID_SUBJECT="mailto:admin@techaks.ru"

            # Email SMTP
            SMTP_HOST="${{ secrets.SMTP_HOST }}"
            SMTP_PORT="${{ secrets.SMTP_PORT || '465' }}"
            SMTP_USER="${{ secrets.SMTP_USER }}"
            SMTP_PASS="${{ secrets.SMTP_PASS }}"
            SMTP_FROM="${{ secrets.SMTP_FROM || 'TechAks <no-reply@techaks.ru>' }}"
            EOF
            EXISTING_DATABASE_URL="$EXISTING_DATABASE_URL" python3 - <<'PY'
            import os
            from pathlib import Path

            env_path = Path(".env")
            env_path.write_text(
                env_path.read_text().replace(
                    "__TECHAKS_DATABASE_URL__",
                    os.environ["EXISTING_DATABASE_URL"],
                    1,
                )
            )
            PY

            # 3. Install dependencies, apply safe idempotent migrations, and build.
            echo "Environment versions:"
            node -v
            npm -v
            echo "Deploying git HEAD $(git rev-parse --short HEAD)"

            echo "Installing dependencies..."
            if ! npm ci; then
              echo "Primary npm ci failed. Cleaning npm cache and retrying once..."
              npm cache clean --force || true
              rm -rf /root/.npm/_cacache || true
              rm -rf node_modules || true
              npm ci
            fi

            echo "Checking dependencies for known vulnerabilities..."
            npm run security:audit

            echo "Applying safe store visibility migration..."
            node --input-type=module <<'NODE'
            import "dotenv/config";
            import mysql from "mysql2/promise";

            const databaseUrl = process.env.DATABASE_URL;
            if (!databaseUrl) {
              throw new Error("DATABASE_URL is required for store visibility migration.");
            }

            const connection = await mysql.createConnection(databaseUrl);
            try {
              const [columns] = await connection.execute(
                "SELECT COLUMN_NAME FROM INFORMATION_SCHEMA.COLUMNS WHERE TABLE_SCHEMA = DATABASE() AND TABLE_NAME = 'stores' AND COLUMN_NAME = 'is_public'",
              );

              if (Array.isArray(columns) && columns.length > 0) {
                console.log("stores.is_public already exists");
              } else {
                await connection.execute(
                  "ALTER TABLE `stores` ADD COLUMN `is_public` boolean NOT NULL DEFAULT true",
                );
                console.log("stores.is_public added");
              }

              const [publicationColumns] = await connection.execute(
                "SELECT COLUMN_NAME FROM INFORMATION_SCHEMA.COLUMNS WHERE TABLE_SCHEMA = DATABASE() AND TABLE_NAME = 'products' AND COLUMN_NAME = 'is_published_from_moysklad'",
              );
              if (!Array.isArray(publicationColumns) || publicationColumns.length === 0) {
                await connection.execute(
                  "ALTER TABLE `products` ADD COLUMN `is_published_from_moysklad` boolean NOT NULL DEFAULT true AFTER `is_active`",
                );
                console.log("products.is_published_from_moysklad added");
              } else {
                console.log("products.is_published_from_moysklad already exists");
              }

              const [publicationIndexes] = await connection.execute(
                "SELECT INDEX_NAME FROM INFORMATION_SCHEMA.STATISTICS WHERE TABLE_SCHEMA = DATABASE() AND TABLE_NAME = 'products' AND INDEX_NAME = 'products_moysklad_publication_idx'",
              );
              if (!Array.isArray(publicationIndexes) || publicationIndexes.length === 0) {
                await connection.execute(
                  "CREATE INDEX `products_moysklad_publication_idx` ON `products` (`is_published_from_moysklad`, `is_active`, `is_auto_blocked`)",
                );
                console.log("products_moysklad_publication_idx added");
              } else {
                console.log("products_moysklad_publication_idx already exists");
              }

              const [loyaltyColumns] = await connection.execute(
                "SELECT COLUMN_NAME FROM INFORMATION_SCHEMA.COLUMNS WHERE TABLE_SCHEMA = DATABASE() AND TABLE_NAME = 'loyalty_sync_jobs' AND COLUMN_NAME = 'active_key'",
              );
              if (!Array.isArray(loyaltyColumns) || loyaltyColumns.length === 0) {
                await connection.execute(
                  "ALTER TABLE `loyalty_sync_jobs` ADD COLUMN `active_key` varchar(190) NULL AFTER `payload_json`",
                );
                await connection.execute(
                  "CREATE UNIQUE INDEX `loyalty_sync_jobs_active_key_unique` ON `loyalty_sync_jobs` (`active_key`)",
                );
                console.log("loyalty_sync_jobs.active_key added");
              } else {
                console.log("loyalty_sync_jobs.active_key already exists");
              }

              await connection.execute(`
                CREATE TABLE IF NOT EXISTS loyalty_bonus_holds (
                  id serial NOT NULL,
                  user_id int NOT NULL,
                  order_id int NOT NULL,
                  amount int NOT NULL,
                  status varchar(20) NOT NULL DEFAULT 'active',
                  expires_at timestamp NOT NULL,
                  created_at timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                  updated_at timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                  PRIMARY KEY (id),
                  UNIQUE KEY loyalty_bonus_holds_order_unique (order_id),
                  KEY loyalty_bonus_holds_user_status_idx (user_id, status, expires_at)
                )
              `);
              console.log("loyalty_bonus_holds is ready");
            } finally {
              await connection.end();
            }
            NODE

            echo "Applying delivery reliability migration..."
            npm run deploy:migrate-delivery

            echo "Applying account settings migration..."
            npm run deploy:migrate-account

            echo "Applying Wordstat demand cluster migration..."
            npm run deploy:migrate-wordstat

            echo "Building application..."
            NODE_OPTIONS=--max-old-space-size=1536 npm run check
            NODE_OPTIONS=--max-old-space-size=1536 npm test
            NODE_OPTIONS=--max-old-space-size=1536 npm run build

            echo "Verifying production schema against SQL migrations..."
            npm run deploy:verify-schema

            echo "Configuring nginx for techaks.ru..."
            cat << 'NGINX' > /etc/nginx/sites-available/techaks
            server {
                listen 80;
                listen [::]:80;
                server_name techaks.ru www.techaks.ru xn--80ajq2abt.xn--p1ai www.xn--80ajq2abt.xn--p1ai;
                return 301 https://techaks.ru$request_uri;
            }

            server {
                listen 443 ssl;
                listen [::]:443 ssl;
                http2 on;
                server_name www.techaks.ru xn--80ajq2abt.xn--p1ai www.xn--80ajq2abt.xn--p1ai;

                ssl_certificate /etc/letsencrypt/live/techaks.ru/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/techaks.ru/privkey.pem;

                return 301 https://techaks.ru$request_uri;
            }

            server {
                listen 443 ssl;
                listen [::]:443 ssl;
                http2 on;
                server_name techaks.ru;

                ssl_certificate /etc/letsencrypt/live/techaks.ru/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/techaks.ru/privkey.pem;

                location / {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                }
            }
            NGINX

            ln -sf /etc/nginx/sites-available/techaks /etc/nginx/sites-enabled/techaks
            rm -f /etc/nginx/sites-enabled/default
            nginx -t
            systemctl reload nginx

            # 4. Restart PM2
            echo "Restarting PM2 process..."
            pm2 restart techaks || pm2 start dist/boot.js --name "techaks"
            
            # Save PM2 state to start on boot
            pm2 save

            # 5. Healthcheck
            echo "Running healthcheck..."
            HEALTH_OK=0
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:3000 >/dev/null; then
                echo "Healthcheck passed on attempt $i"
                HEALTH_OK=1
                break
              fi
              echo "Waiting for app startup... attempt $i/30"
              sleep 2
            done

            if [ "$HEALTH_OK" -ne 1 ]; then
              echo "Healthcheck failed after waiting for app startup"
              exit 1
            fi

            echo "Running API/public/admin healthchecks..."
            smoke_check "https://techaks.ru/api/health"
            smoke_check "https://techaks.ru/"
            smoke_check "https://techaks.ru/catalog?cat=all" "<title>Каталог"
            smoke_check "https://techaks.ru/admin/orders"
            echo "API/public/admin healthchecks passed"
