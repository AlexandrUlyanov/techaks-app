services:
  mysql:
    image: container-registry.oracle.com/mysql/community-server:8.0
    restart: always
    environment:
      MYSQL_DATABASE: tehax
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
